name: Verify
description: Set up Node, install dependencies, and run typecheck, lint, and tests against a MongoDB replica set.

inputs:
  npm_token:
    description: npm token used to install dependencies.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version-file: .nvmrc
        registry-url: https://registry.npmjs.org
        cache: npm
    - run: npm ci
      shell: bash
      env:
        NPM_TOKEN: ${{ inputs.npm_token }}
    # The library requires a MongoDB replica set (transactions / change streams).
    # docker-compose starts a single-node replica set that self-initiates via its
    # healthcheck; wait for it to become healthy before running the suite.
    - name: Start MongoDB
      shell: bash
      run: docker compose up -d --wait
    - run: npm run typecheck
      shell: bash
    - run: npm run lint
      shell: bash
    - run: npm test
      shell: bash
    - if: always()
      shell: bash
      run: docker compose down --volumes
