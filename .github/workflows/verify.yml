name: Verify

# Reusable workflow: typecheck, lint, and test against a MongoDB replica set.
# Called by ci.yml (on pull_request) and release.yml (before publishing).
on:
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      # The library requires a MongoDB replica set (transactions / change streams).
      # docker-compose starts a single-node replica set that self-initiates via its
      # healthcheck; wait for it to become healthy before running the suite.
      - name: Start MongoDB
        run: docker compose up -d --wait
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - if: always()
        run: docker compose down --volumes
